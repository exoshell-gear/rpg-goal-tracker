<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Veronium — Flow State Engine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  
  :root {
    --magic-glow: #22ff88;
    --magic-soft: #34d399;
    --magic-muted: #6ee7b7;
    --magic-dark: #047857;
    
    --bg-void: #030503;
    --bg-deep: #050807;
    --bg-surface: #0a0f0c;
    --bg-raised: #101815;
    
    --text-primary: #e8fff2;
    --text-secondary: #9cb3a3;
    --text-muted: #5a6d60;
    
    --border-dim: rgba(34, 255, 136, 0.08);
    --border-soft: rgba(34, 255, 136, 0.15);
    --border-bright: rgba(34, 255, 136, 0.3);
    
    --shadow-glow: 0 0 20px rgba(34, 255, 136, 0.15);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: radial-gradient(ellipse at 50% 20%, #0a1510, #030503);
    font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at 20% 30%, rgba(34, 255, 136, 0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(34, 255, 136, 0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app-container {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .app-header {
    padding: 1.25rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border-dim);
    background: rgba(5, 8, 7, 0.9);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .app-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--magic-soft);
  }

  .current-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 600;
    background: linear-gradient(135deg, var(--magic-glow), var(--magic-muted));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .current-date {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 0.15rem;
  }

  /* Main Content - Scrollable */
  .main-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .screen {
    display: none;
    padding: 1.25rem;
    min-height: 100%;
  }

  .screen.active {
    display: block;
  }

  /* Navigation Bar */
  .nav-bar {
    padding: 0.5rem 0.75rem 0.75rem;
    background: rgba(5, 8, 7, 0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border-dim);
    flex-shrink: 0;
  }

  .nav-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.35rem;
  }

  .nav-btn {
    background: rgba(34, 255, 136, 0.03);
    border: 1px solid var(--border-dim);
    border-radius: 14px;
    padding: 0.75rem 0.25rem;
    color: var(--text-muted);
    font-size: 0.65rem;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .nav-btn.active {
    background: rgba(34, 255, 136, 0.12);
    border-color: var(--border-bright);
    color: var(--magic-soft);
  }

  .nav-icon {
    font-size: 1rem;
  }

  /* Current Task Card */
  .current-task {
    background: linear-gradient(135deg, rgba(34, 255, 136, 0.08) 0%, rgba(34, 255, 136, 0.03) 100%);
    border: 1.5px solid var(--border-bright);
    border-radius: 24px;
    padding: 1.75rem 1.5rem;
    margin-bottom: 1.25rem;
    box-shadow: var(--shadow-glow);
  }

  .task-status {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--magic-glow);
    margin-bottom: 0.65rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-pulse {
    width: 6px;
    height: 6px;
    background: var(--magic-glow);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--magic-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.8); }
  }

  .task-name {
    font-size: 1.6rem;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 0.9rem;
  }

  .task-meta {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .task-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(34, 255, 136, 0.1);
    border: 1px solid var(--border-soft);
    color: var(--magic-muted);
    padding: 0.3rem 0.8rem;
    border-radius: 16px;
    font-size: 0.7rem;
    font-weight: 500;
  }

  .task-badge.duration {
    font-family: 'JetBrains Mono', monospace;
  }

  .task-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.65rem;
  }

  .btn {
    padding: 0.85rem 1.25rem;
    border: none;
    border-radius: 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Space Grotesk', sans-serif;
    text-align: center;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--magic-soft), var(--magic-dark));
    color: var(--bg-void);
    box-shadow: 0 0 20px rgba(34, 255, 136, 0.3);
  }

  .btn-primary:active {
    transform: scale(0.98);
  }

  .btn-secondary {
    background: rgba(34, 255, 136, 0.08);
    color: var(--magic-muted);
    border: 1px solid var(--border-soft);
  }

  /* Lists */
  .section-header {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }

  .list-item {
    background: rgba(16, 24, 21, 0.6);
    border: 1px solid var(--border-dim);
    border-radius: 18px;
    padding: 1rem 1.15rem;
    margin-bottom: 0.6rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
  }

  .list-item-content {
    flex: 1;
    min-width: 0;
  }

  .list-item-title {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 0.3rem;
  }

  .list-item-meta {
    font-size: 0.7rem;
    color: var(--text-secondary);
  }

  .list-item-actions {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .icon-btn {
    background: rgba(34, 255, 136, 0.08);
    border: 1px solid var(--border-dim);
    color: var(--magic-muted);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn.delete {
    background: rgba(255, 59, 48, 0.1);
    border-color: rgba(255, 59, 48, 0.2);
    color: #ff6b6b;
  }

  /* Add Section */
  .add-section {
    background: rgba(34, 255, 136, 0.03);
    border: 1px dashed var(--border-soft);
    border-radius: 18px;
    padding: 1.25rem;
    margin-top: 1rem;
  }

  .add-section h3 {
    font-size: 0.95rem;
    margin-bottom: 0.9rem;
    color: var(--magic-soft);
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    padding: 0.75rem;
    color: var(--text-primary);
    font-size: 0.9rem;
    font-family: 'Space Grotesk', sans-serif;
    margin-bottom: 0.65rem;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--border-bright);
  }

  .time-input-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.65rem;
  }

  .time-separator {
    font-size: 1.1rem;
    color: var(--text-muted);
    text-align: center;
  }

  /* Checkboxes for multi-select */
  .checkbox-group {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.5rem;
    margin-bottom: 0.65rem;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: 10px;
    padding: 0.65rem 0.85rem;
    cursor: pointer;
  }

  .checkbox-item input[type="checkbox"] {
    width: auto;
    margin: 0;
  }

  .checkbox-item label {
    font-size: 0.8rem;
    cursor: pointer;
    flex: 1;
  }

  /* Day Tabs */
  .day-tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }

  .day-tab {
    padding: 0.5rem 0.9rem;
    background: var(--bg-raised);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    color: var(--text-secondary);
  }

  .day-tab.active {
    background: rgba(34, 255, 136, 0.15);
    border-color: var(--border-bright);
    color: var(--magic-soft);
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.3;
  }

  .empty-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
    color: var(--text-secondary);
  }

  .empty-description {
    font-size: 0.85rem;
    line-height: 1.4;
  }

  /* Stats */
  .stats-bar {
    background: rgba(34, 255, 136, 0.05);
    border: 1px solid var(--border-dim);
    border-radius: 16px;
    padding: 1rem;
    margin-bottom: 1.25rem;
    display: flex;
    justify-content: space-around;
    text-align: center;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--magic-glow), var(--magic-muted));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  /* Next Items */
  .next-item {
    background: rgba(16, 24, 21, 0.4);
    border: 1px solid var(--border-dim);
    border-radius: 16px;
    padding: 0.9rem 1.1rem;
    margin-bottom: 0.6rem;
  }

  .next-item-name {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 0.35rem;
  }

  .next-item-meta {
    font-size: 0.7rem;
    color: var(--text-secondary);
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }

  .meta-separator {
    color: var(--text-muted);
  }

  /* Edit Modal */
  .edit-modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(3, 5, 3, 0.95);
    backdrop-filter: blur(10px);
    z-index: 2000;
    display: none;
    padding: 1.25rem;
    overflow-y: auto;
  }

  .edit-modal.active {
    display: flex;
    flex-direction: column;
  }

  .edit-modal-content {
    background: var(--bg-surface);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 1.5rem;
    margin: auto 0;
    box-shadow: var(--shadow-glow);
  }

  .edit-modal h2 {
    font-size: 1.2rem;
    margin-bottom: 1.25rem;
    color: var(--magic-muted);
  }

  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .category-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.65rem;
  }

  .category-pill {
    background: rgba(34, 255, 136, 0.1);
    border: 1px solid var(--border-soft);
    color: var(--magic-muted);
    padding: 0.4rem 0.8rem;
    border-radius: 14px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .category-pill.selected {
    background: var(--magic-dark);
    border-color: var(--magic-soft);
    color: var(--text-primary);
  }
</style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="app-header">
      <div class="header-top">
        <div class="app-title">Flow State Engine</div>
      </div>
      <div class="current-time" id="currentTime">00:00</div>
      <div class="current-date" id="currentDate">—</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Home Screen -->
      <div class="screen active" id="homeScreen"></div>

      <!-- Tasks Screen -->
      <div class="screen" id="tasksScreen"></div>

      <!-- Rituals Screen -->
      <div class="screen" id="ritualsScreen"></div>

      <!-- Schedule Screen -->
      <div class="screen" id="scheduleScreen"></div>

      <!-- Tags Screen -->
      <div class="screen" id="tagsScreen"></div>
    </div>

    <!-- Navigation -->
    <div class="nav-bar">
      <div class="nav-grid">
        <button class="nav-btn active" data-screen="home">
          <div class="nav-icon">◆</div>
          <div>Now</div>
        </button>
        <button class="nav-btn" data-screen="tasks">
          <div class="nav-icon">✦</div>
          <div>Tasks</div>
        </button>
        <button class="nav-btn" data-screen="rituals">
          <div class="nav-icon">🔁</div>
          <div>Rituals</div>
        </button>
        <button class="nav-btn" data-screen="schedule">
          <div class="nav-icon">📅</div>
          <div>Schedule</div>
        </button>
        <button class="nav-btn" data-screen="tags">
          <div class="nav-icon">⌗</div>
          <div>Tags</div>
        </button>
      </div>
    </div>
  </div>

  <!-- Edit Task Modal -->
  <div class="edit-modal" id="editTaskModal">
    <div class="edit-modal-content">
      <h2>Edit Task</h2>
      <input type="text" id="editTaskTitle" placeholder="Task name" />
      <div class="section-header">Categories</div>
      <div class="category-pills" id="editTaskCategories"></div>
      <input type="number" id="editTaskDuration" placeholder="Duration (minutes)" />
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
        <button class="btn btn-primary" id="saveEditBtn">Save</button>
      </div>
    </div>
  </div>

<script>
  // ============ DATA ============
  let tasks = [];
  let rituals = [];
  let categories = [
    'Deep Work', 'Movement', 'Learning', 'Creation', 'Connection',
    'Reflection', 'Restoration', 'Strategy', 'Admin', 'Health',
    'Finance', 'Marketing', 'Product', 'Sales', 'Research',
    'Writing', 'Design', 'Code'
  ];
  let settings = { framework: {} };
  let completions = [];
  let editingTaskId = null;

  // ============ STORAGE ============
  function saveData() {
    localStorage.setItem('veronium_tasks', JSON.stringify(tasks));
    localStorage.setItem('veronium_rituals', JSON.stringify(rituals));
    localStorage.setItem('veronium_categories', JSON.stringify(categories));
    localStorage.setItem('veronium_settings', JSON.stringify(settings));
    localStorage.setItem('veronium_completions', JSON.stringify(completions));
  }

  function loadData() {
    try {
      const storedTasks = localStorage.getItem('veronium_tasks');
      const storedRituals = localStorage.getItem('veronium_rituals');
      const storedCategories = localStorage.getItem('veronium_categories');
      const storedSettings = localStorage.getItem('veronium_settings');
      const storedCompletions = localStorage.getItem('veronium_completions');
      
      if (storedTasks) tasks = JSON.parse(storedTasks);
      if (storedRituals) rituals = JSON.parse(storedRituals);
      if (storedCategories) categories = JSON.parse(storedCategories);
      if (storedSettings) settings = JSON.parse(storedSettings);
      if (storedCompletions) completions = JSON.parse(storedCompletions);

      // Migrate old single-category tasks to multi-category
      tasks = tasks.map(t => {
        if (typeof t.categories === 'string') {
          return { ...t, categories: [t.categories] };
        }
        if (!t.categories) {
          return { ...t, categories: t.category ? [t.category] : [] };
        }
        return t;
      });
      
      // Migrate old single-day rituals to multi-day
      rituals = rituals.map(r => {
        if (typeof r.days === 'string') {
          return { ...r, days: [r.days] };
        }
        if (!r.days && r.dayOfWeek) {
          return { ...r, days: [r.dayOfWeek] };
        }
        return r;
      });
    } catch (e) {
      console.error('Error loading data:', e);
    }
  }

  // ============ TIME ============
  function updateClock() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
    
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const dayName = days[now.getDay()];
    const monthName = months[now.getMonth()];
    const date = now.getDate();
    document.getElementById('currentDate').textContent = `${dayName} · ${monthName} ${date}`;
  }

  function getCurrentDayName() {
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    return days[new Date().getDay()];
  }

  function getCurrentTime() {
    const now = new Date();
    return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
  }

  function parseTime(timeStr) {
    const [h, m] = timeStr.split(':').map(Number);
    return h * 60 + m;
  }

  function formatDuration(minutes) {
    const hrs = Math.floor(minutes / 60);
    const mins = minutes % 60;
    if (hrs > 0) return mins > 0 ? `${hrs}h ${mins}m` : `${hrs}h`;
    return `${minutes}m`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ============ TASK LOGIC ============
  function getScheduledBlocksForToday() {
    const today = getCurrentDayName();
    const blocks = settings.framework[today] || {};
    return Object.entries(blocks).map(([range, data]) => {
      const [start, end] = range.split('-');
      return { 
        start, 
        end, 
        category: data.category || data,
        days: data.days || [today],
        range 
      };
    }).sort((a, b) => parseTime(a.start) - parseTime(b.start));
  }

  function getActiveRitualsForToday() {
    const today = getCurrentDayName();
    return rituals.filter(r => r.active && r.days && r.days.includes(today))
      .sort((a, b) => parseTime(a.timeOfDay) - parseTime(b.timeOfDay));
  }

  function getCombinedSchedule() {
    const scheduleBlocks = getScheduledBlocksForToday();
    const todayRituals = getActiveRitualsForToday();
    
    const items = [];
    
    scheduleBlocks.forEach(block => {
      items.push({ type: 'schedule', time: block.start, data: block });
    });
    
    todayRituals.forEach(ritual => {
      items.push({ type: 'ritual', time: ritual.timeOfDay, data: ritual });
    });
    
    items.sort((a, b) => parseTime(a.time) - parseTime(b.time));
    return items;
  }

  function getCurrentTask() {
    const currentTime = parseTime(getCurrentTime());
    const schedule = getCombinedSchedule();
    
    for (let i = 0; i < schedule.length; i++) {
      const item = schedule[i];
      const itemTime = parseTime(item.time);
      
      if (item.type === 'schedule') {
        const endTime = parseTime(item.data.end);
        if (currentTime >= itemTime && currentTime < endTime) {
          return item;
        }
      } else if (item.type === 'ritual') {
        const endTime = itemTime + item.data.duration;
        if (currentTime >= itemTime && currentTime < endTime) {
          return item;
        }
      }
    }
    
    return null;
  }

  function getNextTasks(limit = 3) {
    const currentTime = parseTime(getCurrentTime());
    const schedule = getCombinedSchedule();
    
    const upcoming = schedule.filter(item => {
      const itemTime = parseTime(item.time);
      return itemTime > currentTime;
    });
    
    return upcoming.slice(0, limit);
  }

  function findTaskForCategory(category) {
    // Find first incomplete task that has this category
    return tasks.find(t => 
      !t.completed && 
      t.categories && 
      t.categories.includes(category)
    );
  }

  // ============ NAVIGATION ============
  function switchScreen(screenName) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(screenName + 'Screen').classList.add('active');
    document.querySelector(`[data-screen="${screenName}"]`).classList.add('active');
    
    renderCurrentScreen(screenName);
  }

  function renderCurrentScreen(screenName) {
    switch(screenName) {
      case 'home': renderHomeScreen(); break;
      case 'tasks': renderTasksScreen(); break;
      case 'rituals': renderRitualsScreen(); break;
      case 'schedule': renderScheduleScreen(); break;
      case 'tags': renderTagsScreen(); break;
    }
  }

  // ============ HOME SCREEN ============
  function renderHomeScreen() {
    const container = document.getElementById('homeScreen');
    const currentItem = getCurrentTask();
    const nextItems = getNextTasks(3);
    
    if (currentItem) {
      renderCurrentBlock(container, currentItem, nextItems);
    } else if (nextItems.length > 0) {
      renderUpcoming(container, nextItems);
    } else {
      renderEmptyHome(container);
    }
  }

  function renderCurrentBlock(container, currentItem, nextItems) {
    const isRitual = currentItem.type === 'ritual';
    const item = currentItem.data;
    
    let taskToShow = null;
    let taskName, displayCategories, duration;
    
    if (isRitual) {
      taskName = item.title;
      displayCategories = [item.category];
      duration = item.duration;
    } else {
      // Schedule block - find matching task
      taskToShow = findTaskForCategory(item.category);
      
      if (taskToShow) {
        taskName = taskToShow.title;
        displayCategories = taskToShow.categories;
        duration = taskToShow.duration;
      } else {
        taskName = `${item.category} Block`;
        displayCategories = [item.category];
        const startMin = parseTime(item.start);
        const endMin = parseTime(item.end);
        duration = endMin - startMin;
      }
    }
    
    const todayCompletions = completions.filter(c => {
      const cDate = new Date(c.timestamp);
      const today = new Date();
      return cDate.toDateString() === today.toDateString();
    });
    
    container.innerHTML = `
      <div class="current-task">
        <div class="task-status">
          <div class="status-pulse"></div>
          ${isRitual ? 'Active Ritual' : taskToShow ? 'Current Task' : 'Current Block'}
        </div>
        <div class="task-name">${escapeHtml(taskName)}</div>
        <div class="task-meta">
          ${displayCategories.map(cat => `<div class="task-badge">${escapeHtml(cat)}</div>`).join('')}
          <div class="task-badge duration">${formatDuration(duration)}</div>
          ${isRitual ? '<div class="task-badge">🔁</div>' : ''}
        </div>
        ${!taskToShow && !isRitual ? `<div style="margin-top: 0.75rem; padding: 0.75rem; background: rgba(34, 255, 136, 0.05); border-radius: 12px; font-size: 0.85rem; color: var(--text-secondary);">No tasks in this category. Add one in the Tasks tab.</div>` : ''}
        <div class="task-actions">
          <button class="btn btn-primary" id="completeCurrentBtn">✓ Complete${taskToShow ? ' Task' : ''}</button>
        </div>
      </div>
      
      ${nextItems.length > 0 ? `
        <div class="section-header">Up Next</div>
        ${nextItems.map(next => {
          const nextIsRitual = next.type === 'ritual';
          const nextData = next.data;
          const nextName = nextIsRitual ? nextData.title : `${nextData.category} Block`;
          const nextCat = nextIsRitual ? nextData.category : nextData.category;
          const nextDur = nextIsRitual ? nextData.duration : (parseTime(nextData.end) - parseTime(nextData.start));
          
          return `
            <div class="next-item">
              <div class="next-item-name">${escapeHtml(nextName)} ${nextIsRitual ? '🔁' : ''}</div>
              <div class="next-item-meta">
                <span>${next.time}</span>
                <span class="meta-separator">·</span>
                <span>${escapeHtml(nextCat)}</span>
                <span class="meta-separator">·</span>
                <span>${formatDuration(nextDur)}</span>
              </div>
            </div>
          `;
        }).join('')}
      ` : ''}
      
      ${todayCompletions.length > 0 ? `
        <div class="stats-bar">
          <div>
            <div class="stat-value">${todayCompletions.length}</div>
            <div class="stat-label">Completed</div>
          </div>
          <div>
            <div class="stat-value">${Math.round(todayCompletions.reduce((sum, c) => sum + c.duration, 0))}m</div>
            <div class="stat-label">Flow Time</div>
          </div>
        </div>
      ` : ''}
    `;
    
    document.getElementById('completeCurrentBtn')?.addEventListener('click', () => {
      if (taskToShow) {
        // Mark the task as completed
        taskToShow.completed = true;
      }
      
      completions.push({
        id: Date.now(),
        name: taskName,
        categories: displayCategories,
        duration: duration,
        timestamp: new Date().toISOString()
      });
      
      saveData();
      renderHomeScreen();
    });
  }

  function renderUpcoming(container, nextItems) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div class="empty-title">Between Sessions</div>
        <div class="empty-description">Your next block begins soon</div>
      </div>
      
      <div class="section-header">Coming Up</div>
      ${nextItems.map(next => {
        const nextIsRitual = next.type === 'ritual';
        const nextData = next.data;
        const nextName = nextIsRitual ? nextData.title : `${nextData.category} Block`;
        const nextCat = nextIsRitual ? nextData.category : nextData.category;
        const nextDur = nextIsRitual ? nextData.duration : (parseTime(nextData.end) - parseTime(nextData.start));
        
        return `
          <div class="next-item">
            <div class="next-item-name">${escapeHtml(nextName)} ${nextIsRitual ? '🔁' : ''}</div>
            <div class="next-item-meta">
              <span>${next.time}</span>
              <span class="meta-separator">·</span>
              <span>${escapeHtml(nextCat)}</span>
              <span class="meta-separator">·</span>
              <span>${formatDuration(nextDur)}</span>
            </div>
          </div>
        `;
      }).join('')}
    `;
  }

  function renderEmptyHome(container) {
    const todayCompletions = completions.filter(c => {
      const cDate = new Date(c.timestamp);
      const today = new Date();
      return cDate.toDateString() === today.toDateString();
    });
    
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✨</div>
        <div class="empty-title">Clear Horizon</div>
        <div class="empty-description">Add rituals or schedule blocks to structure your flow</div>
      </div>
      
      ${todayCompletions.length > 0 ? `
        <div class="stats-bar">
          <div>
            <div class="stat-value">${todayCompletions.length}</div>
            <div class="stat-label">Completed</div>
          </div>
          <div>
            <div class="stat-value">${Math.round(todayCompletions.reduce((sum, c) => sum + c.duration, 0))}m</div>
            <div class="stat-label">Flow Time</div>
          </div>
        </div>
      ` : ''}
    `;
  }

  // ============ TASKS SCREEN ============
  function renderTasksScreen() {
    const container = document.getElementById('tasksScreen');
    
    container.innerHTML = `
      <div class="section-header">All Tasks</div>
      ${tasks.length === 0 ? '<div class="empty-state"><div class="empty-description">No tasks yet</div></div>' :
        tasks.map(task => `
          <div class="list-item">
            <div class="list-item-content">
              <div class="list-item-title">${escapeHtml(task.title)}</div>
              <div class="list-item-meta">
                ${task.categories.map(c => escapeHtml(c)).join(', ')} · ${task.duration}m
                ${task.completed ? ' · ✓ Done' : ''}
              </div>
            </div>
            <div class="list-item-actions">
              <button class="icon-btn" data-edit="${task.id}">✎</button>
              <button class="icon-btn delete" data-delete="${task.id}">✕</button>
            </div>
          </div>
        `).join('')
      }
      
      <div class="add-section">
        <h3>+ Create Task</h3>
        <input type="text" id="newTaskTitle" placeholder="What needs to be done?" />
        <div class="section-header" style="margin-top: 0.5rem;">Categories (select multiple)</div>
        <div class="category-pills" id="newTaskCategories">
          ${categories.map(cat => `
            <div class="category-pill" data-category="${escapeHtml(cat)}">${escapeHtml(cat)}</div>
          `).join('')}
        </div>
        <input type="number" id="newTaskDuration" placeholder="Duration (minutes)" value="60" />
        <button class="btn btn-primary" id="addTaskBtn">Add Task</button>
      </div>
    `;
    
    // Category selection
    const selectedCategories = new Set();
    document.querySelectorAll('#newTaskCategories .category-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const cat = pill.dataset.category;
        if (selectedCategories.has(cat)) {
          selectedCategories.delete(cat);
          pill.classList.remove('selected');
        } else {
          selectedCategories.add(cat);
          pill.classList.add('selected');
        }
      });
    });
    
    document.getElementById('addTaskBtn')?.addEventListener('click', () => {
      const title = document.getElementById('newTaskTitle').value.trim();
      const duration = parseInt(document.getElementById('newTaskDuration').value);
      
      if (title && selectedCategories.size > 0 && duration > 0) {
        tasks.push({
          id: Date.now(),
          title,
          categories: Array.from(selectedCategories),
          duration,
          completed: false
        });
        saveData();
        renderTasksScreen();
      }
    });
    
    document.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.edit);
        openEditTaskModal(id);
      });
    });
    
    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.delete);
        tasks = tasks.filter(t => t.id !== id);
        saveData();
        renderTasksScreen();
      });
    });
  }

  function openEditTaskModal(taskId) {
    const task = tasks.find(t => t.id === taskId);
    if (!task) return;
    
    editingTaskId = taskId;
    const modal = document.getElementById('editTaskModal');
    
    document.getElementById('editTaskTitle').value = task.title;
    document.getElementById('editTaskDuration').value = task.duration;
    
    const categoryContainer = document.getElementById('editTaskCategories');
    categoryContainer.innerHTML = categories.map(cat => `
      <div class="category-pill ${task.categories.includes(cat) ? 'selected' : ''}" data-category="${escapeHtml(cat)}">
        ${escapeHtml(cat)}
      </div>
    `).join('');
    
    categoryContainer.querySelectorAll('.category-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        pill.classList.toggle('selected');
      });
    });
    
    modal.classList.add('active');
  }

  document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
    document.getElementById('editTaskModal').classList.remove('active');
  });

  document.getElementById('saveEditBtn')?.addEventListener('click', () => {
    const task = tasks.find(t => t.id === editingTaskId);
    if (!task) return;
    
    task.title = document.getElementById('editTaskTitle').value.trim();
    task.duration = parseInt(document.getElementById('editTaskDuration').value);
    
    const selectedCats = [];
    document.querySelectorAll('#editTaskCategories .category-pill.selected').forEach(pill => {
      selectedCats.push(pill.dataset.category);
    });
    task.categories = selectedCats;
    
    saveData();
    document.getElementById('editTaskModal').classList.remove('active');
    renderTasksScreen();
  });

  // ============ RITUALS SCREEN ============
  function renderRitualsScreen() {
    const container = document.getElementById('ritualsScreen');
    
    // Sort rituals by time
    const sortedRituals = [...rituals].sort((a, b) => parseTime(a.timeOfDay) - parseTime(b.timeOfDay));
    
    container.innerHTML = `
      <div class="section-header">Recurring Rituals</div>
      ${sortedRituals.length === 0 ? '<div class="empty-state"><div class="empty-description">No rituals set</div></div>' :
        sortedRituals.map(ritual => `
          <div class="list-item">
            <div class="list-item-content">
              <div class="list-item-title">${escapeHtml(ritual.title)}</div>
              <div class="list-item-meta">
                ${ritual.days.join(', ')} at ${ritual.timeOfDay} · ${ritual.duration}m
                ${ritual.active ? '' : ' · Paused'}
              </div>
            </div>
            <div class="list-item-actions">
              <button class="icon-btn delete" data-delete="${ritual.id}">✕</button>
            </div>
          </div>
        `).join('')
      }
      
      <div class="add-section">
        <h3>+ Create Ritual</h3>
        <input type="text" id="ritualTitle" placeholder="e.g., Morning Review" />
        
        <div class="section-header" style="margin-top: 0.5rem;">Repeat On</div>
        <div class="checkbox-group">
          ${['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map((day, i) => {
            const fullDay = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'][i];
            return `
              <div class="checkbox-item">
                <input type="checkbox" id="day${i}" value="${fullDay}" />
                <label for="day${i}">${day}</label>
              </div>
            `;
          }).join('')}
        </div>
        
        <div class="section-header" style="margin-top: 0.5rem;">Time</div>
        <div class="time-input-row">
          <select id="ritualHour">
            ${Array.from({length: 24}, (_, i) => `<option value="${i}">${i.toString().padStart(2, '0')}</option>`).join('')}
          </select>
          <span class="time-separator">:</span>
          <select id="ritualMinute">
            ${Array.from({length: 12}, (_, i) => i * 5).map(m => `<option value="${m}">${m.toString().padStart(2, '0')}</option>`).join('')}
          </select>
        </div>
        
        <select id="ritualCategory">
          ${categories.map(cat => `<option>${escapeHtml(cat)}</option>`).join('')}
        </select>
        <input type="number" id="ritualDuration" placeholder="Duration (minutes)" value="30" />
        <button class="btn btn-primary" id="addRitualBtn">Create Ritual</button>
      </div>
    `;
    
    document.getElementById('addRitualBtn')?.addEventListener('click', () => {
      const title = document.getElementById('ritualTitle').value.trim();
      const hour = parseInt(document.getElementById('ritualHour').value);
      const minute = parseInt(document.getElementById('ritualMinute').value);
      const category = document.getElementById('ritualCategory').value;
      const duration = parseInt(document.getElementById('ritualDuration').value);
      
      const selectedDays = [];
      for (let i = 0; i < 7; i++) {
        const checkbox = document.getElementById(`day${i}`);
        if (checkbox.checked) {
          selectedDays.push(checkbox.value);
        }
      }
      
      if (title && selectedDays.length > 0 && duration > 0) {
        const timeStr = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
        rituals.push({
          id: Date.now(),
          title,
          category,
          duration,
          days: selectedDays,
          timeOfDay: timeStr,
          active: true
        });
        saveData();
        renderRitualsScreen();
        renderHomeScreen();
      }
    });
    
    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.delete);
        rituals = rituals.filter(r => r.id !== id);
        saveData();
        renderRitualsScreen();
        renderHomeScreen();
      });
    });
  }

  // ============ SCHEDULE SCREEN ============
  let currentScheduleDay = getCurrentDayName();
  
  function renderScheduleScreen() {
    const container = document.getElementById('scheduleScreen');
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const blocks = settings.framework[currentScheduleDay] || {};
    
    container.innerHTML = `
      <div class="day-tabs">
        ${days.map(day => `
          <div class="day-tab ${day === currentScheduleDay ? 'active' : ''}" data-day="${day}">
            ${day.slice(0, 3)}
          </div>
        `).join('')}
      </div>
      
      <div class="section-header">${currentScheduleDay} Schedule</div>
      ${Object.keys(blocks).length === 0 ? '<div class="empty-state"><div class="empty-description">No blocks for this day</div></div>' :
        Object.entries(blocks).map(([range, data]) => {
          const category = data.category || data;
          return `
            <div class="list-item">
              <div class="list-item-content">
                <div class="list-item-title">${range}</div>
                <div class="list-item-meta">${escapeHtml(category)}</div>
              </div>
              <div class="list-item-actions">
                <button class="icon-btn delete" data-delete="${escapeHtml(range)}">✕</button>
              </div>
            </div>
          `;
        }).join('')
      }
      
      <div class="add-section">
        <h3>+ Add Time Block</h3>
        <div class="time-input-row">
          <input type="text" id="startTime" placeholder="09:00" />
          <span class="time-separator">→</span>
          <input type="text" id="endTime" placeholder="11:00" />
        </div>
        <select id="blockCategory">
          ${categories.map(cat => `<option>${escapeHtml(cat)}</option>`).join('')}
        </select>
        
        <div class="section-header" style="margin-top: 0.5rem;">Repeat On</div>
        <div class="checkbox-group">
          ${['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map((day, i) => {
            const fullDay = days[i];
            return `
              <div class="checkbox-item">
                <input type="checkbox" id="schedDay${i}" value="${fullDay}" ${fullDay === currentScheduleDay ? 'checked' : ''} />
                <label for="schedDay${i}">${day}</label>
              </div>
            `;
          }).join('')}
        </div>
        
        <button class="btn btn-primary" id="addBlockBtn">Add Block</button>
      </div>
    `;
    
    document.querySelectorAll('.day-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentScheduleDay = tab.dataset.day;
        renderScheduleScreen();
      });
    });
    
    document.getElementById('addBlockBtn')?.addEventListener('click', () => {
      const start = document.getElementById('startTime').value.trim();
      const end = document.getElementById('endTime').value.trim();
      const category = document.getElementById('blockCategory').value;
      
      const selectedDays = [];
      for (let i = 0; i < 7; i++) {
        const checkbox = document.getElementById(`schedDay${i}`);
        if (checkbox.checked) {
          selectedDays.push(checkbox.value);
        }
      }
      
      if (start && end && selectedDays.length > 0) {
        selectedDays.forEach(day => {
          if (!settings.framework[day]) {
            settings.framework[day] = {};
          }
          settings.framework[day][`${start}-${end}`] = {
            category: category,
            days: selectedDays
          };
        });
        saveData();
        renderScheduleScreen();
        renderHomeScreen();
      }
    });
    
    document.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', () => {
        const range = btn.dataset.delete;
        delete settings.framework[currentScheduleDay][range];
        saveData();
        renderScheduleScreen();
        renderHomeScreen();
      });
    });
  }

  // ============ TAGS SCREEN ============
  function renderTagsScreen() {
    const container = document.getElementById('tagsScreen');
    
    container.innerHTML = `
      <div class="section-header">All Categories</div>
      ${categories.map(cat => `
        <div class="list-item">
          <div class="list-item-content">
            <div class="list-item-title">${escapeHtml(cat)}</div>
          </div>
          <div class="list-item-actions">
            <button class="icon-btn delete" data-cat="${escapeHtml(cat)}">✕</button>
          </div>
        </div>
      `).join('')}
      
      <div class="add-section">
        <h3>+ New Category</h3>
        <input type="text" id="newCategoryName" placeholder="e.g., Exercise" />
        <button class="btn btn-primary" id="addCategoryBtn">Add Category</button>
      </div>
    `;
    
    document.getElementById('addCategoryBtn')?.addEventListener('click', () => {
      const name = document.getElementById('newCategoryName').value.trim();
      if (name && !categories.includes(name)) {
        categories.push(name);
        saveData();
        renderTagsScreen();
      }
    });
    
    document.querySelectorAll('[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cat = btn.dataset.cat;
        const inUse = tasks.some(t => t.categories && t.categories.includes(cat)) || 
                      rituals.some(r => r.category === cat) ||
                      Object.values(settings.framework).some(day => 
                        Object.values(day).some(block => 
                          (block.category || block) === cat
                        )
                      );
        
        if (inUse) {
          alert(`"${cat}" is in use and cannot be deleted.`);
          return;
        }
        
        categories = categories.filter(c => c !== cat);
        saveData();
        renderTagsScreen();
      });
    });
  }

  // ============ INIT ============
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const screen = btn.dataset.screen;
      switchScreen(screen);
    });
  });

  loadData();
  updateClock();
  renderHomeScreen();
  setInterval(updateClock, 1000);
  setInterval(() => {
    if (document.querySelector('.screen.active').id === 'homeScreen') {
      renderHomeScreen();
    }
  }, 60000);
</script>
</body>
</html>
